{% extends "analysis/base.html" %}
{% block title %}Lookup Results — DentAI{% endblock %}

{% block content %}
<div class="fade-in max-w-lg mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-dental-50 rounded-2xl mx-auto mb-4 flex items-center justify-center">
            <i data-lucide="search" class="w-8 h-8 text-dental-500"></i>
        </div>
        <h2 class="text-3xl font-display font-bold text-gray-800 mb-2">Lookup Results</h2>
        <p class="text-gray-500">Enter your 6-digit patient code to view analysis results</p>
    </div>

    <!-- Lookup Form -->
    <div class="glass-card rounded-3xl shadow-2xl p-8">
        <form method="post">
            {% csrf_token %}
            <div class="mb-6">
                <label for="unique_code" class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                    <i data-lucide="hash" class="w-4 h-4 text-dental-600"></i>
                    Patient Code
                </label>
                <input type="text" name="unique_code" id="unique_code" 
                       maxlength="6" pattern="[0-9]{6}" inputmode="numeric"
                       class="w-full px-4 py-4 rounded-xl border-2 border-gray-200 
                              focus:border-dental-500 focus:ring-2 focus:ring-dental-200 
                              transition-all duration-300 text-gray-700 bg-white
                              text-center text-2xl font-mono font-bold tracking-[0.5em]"
                       placeholder="000000"
                       autocomplete="off">
            </div>

            {% if error %}
            <div class="mb-6 bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-3">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5"></i>
                <p class="text-red-600 text-sm">{{ error }}</p>
            </div>
            {% endif %}

            <button type="submit" 
                    class="w-full px-6 py-4 bg-dental-600 hover:bg-dental-700 text-white font-semibold 
                           rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 
                           flex items-center justify-center gap-3">
                <i data-lucide="search" class="w-5 h-5"></i>
                Find Results
            </button>
        </form>
    </div>

    <!-- Back Link -->
    <div class="text-center mt-6">
        <a href="{% url 'analysis:upload' %}" 
           class="text-dental-600 hover:text-dental-800 text-sm font-medium transition-colors flex items-center justify-center gap-2">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Upload
        </a>
    </div>
</div>
{% endblock %}
